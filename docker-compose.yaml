services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apprise-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - apprise

  apprise:
    image: caronc/apprise:latest
    container_name: apprise
    ports:
      - "8000:8000"

